<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid IoT Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        @keyframes status-pulse {
            0% { box-shadow: 0 0 8px 2px rgba(40, 167, 69, 0.4); }
            100% { box-shadow: none; }
        }
        .pulse-effect {
            animation: status-pulse 0.6s ease-out;
        }
        .last-updated {
            font-size: 0.85em;
            color: #6c757d;
            font-weight: normal;
            margin-left: 10px;
            display: inline-block;
            padding: 2px 4px;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="app">
        <h1>Hybrid IoT Dashboard</h1>
        <div id="login-panel" class="card">
            <h2>Login</h2>
            <label>Username</label>
            <input id="username" type="text" value="operator" />
            <label>Password</label>
            <input id="password" type="password" value="operator" />
            <button id="login-button">Sign In</button>
            <p id="login-error" class="error"></p>
        </div>

        <div id="dashboard-panel" class="hidden">
            <!-- Metrics Grid -->
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-icon">📁</div>
                    <div class="metric-details">
                        <span class="metric-title">Local Buffer</span>
                        <span id="metric-buffer-status" class="metric-value">Checking...</span>
                    </div>
                </div>
                <div class="metric-card">
                    <div class="metric-icon">⚡</div>
                    <div class="metric-details">
                        <span class="metric-title">IoTDB Cloud Status</span>
                        <span id="metric-iotdb-status" class="metric-value">Connecting...</span>
                    </div>
                </div>
                <div class="metric-card">
                    <div class="metric-icon">📟</div>
                    <div class="metric-details">
                        <span class="metric-title">Active Devices</span>
                        <span id="metric-active-devices" class="metric-value">None</span>
                    </div>
                </div>
                <div class="metric-card">
                    <div class="metric-icon">🔄</div>
                    <div class="metric-details">
                        <span class="metric-title">Last Sync Job</span>
                        <span id="metric-last-sync" class="metric-value">Never</span>
                    </div>
                </div>
            </div>

            <!-- Sync Controls -->
            <div class="sync-section card">
                <button id="sync-button">Sync to IoTDB</button>
                <button id="retry-button">Retry Last Sync</button>
                <div id="buffer-info" class="buffer-status">
                    <span class="status-dot"></span>
                    <span id="buffer-text">Checking local buffer...</span>
                    <span id="buffer-last-updated" class="last-updated"></span>
                </div>
                <div class="status-row">
                    <span id="sync-status">No sync started</span>
                    <span id="sync-progress"></span>
                    <span id="refresh-countdown" class="last-updated" style="margin-left: auto;"></span>
                </div>
            </div>


            <div id="toast" class="toast hidden"></div>
            <div id="error-log" class="error-card hidden"></div>

            <!-- Charts Grid -->
            <div class="charts-container">
                <div class="card chart-card">
                    <div id="tsfile-status" class="chart-header">
                        <span id="tsfile-status-text">TSFile: Checking...</span>
                        <span id="tsfile-last-updated" class="last-updated"></span>
                    </div>
                    <div id="plot" class="chart"></div>
                </div>
                <div class="card chart-card">
                    <div id="iotdb-status" class="chart-header">
                        <span id="iotdb-status-text">IoTDB Status: Checking...</span>
                        <span id="iotdb-last-updated" class="last-updated"></span>
                    </div>
                    <div id="plot-iotdb" class="chart"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/js/script.js"></script>
</body>
</html>
