services:
  iotdb:
    image: apache/iotdb:latest
    ports:
      - "6667:6667"
    environment:
      - IOTDB_USERNAME=root
      - IOTDB_PASSWORD=root
      - dn_rpc_address=0.0.0.0
      - dn_rpc_port=6667
    volumes:
      - iotdb_data:/iotdb/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6667'" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - iot_network

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.fastapi
    ports:
      - "8000:8000"
    environment:
      - IOTDB_HOST=iotdb
      - IOTDB_PORT=6667
      - IOTDB_USER=root
      - IOTDB_PASSWORD=root
      - LOCAL_TSFILE_PATH=/data/tsfile.ts
    volumes:
      - ./data:/data
    depends_on:
      iotdb:
        condition: service_healthy
    networks:
      - iot_network

volumes:
  iotdb_data:

networks:
  iot_network:
    driver: bridge